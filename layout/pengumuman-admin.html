  vertical-align:middle;
  text-align:center;
}

  font-size:13px;
}

</style>

<body>

<script>

if(localStorage.getItem("isLogin") !== "true"){
  window.location.href = "index.html";

</script>

<div class="main">

<div class="topbar">
<h4>Kelola Pengumuman Seleksi</h4>
</div>

<div class="content">

<div class="card-box">

<div class="row mb-3">

<div class="col-md-4 mb-2">
<input type="text"
id="search"
class="form-control"
placeholder="Cari nama atau NIM">
</div>

<div class="col-md-3 mb-2">
<select id="filterStatus"
class="form-select">

<option value="">Semua Status</option>
<option value="Menunggu">Menunggu</option>
<option value="Diterima">Diterima</option>
<option value="Ditolak">Ditolak</option>

</select>
</div>

</div>

<div class="table-box">

<table class="table table-bordered align-middle">

<thead>

<tr>
<th>No</th>
<th>Nama</th>
<th>NIM</th>
<th>Prodi</th>
<th>Status</th>
<th>Tanggal</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

</div>

</div>

</div>
</div>

<!-- MODAL DETAIL -->

<div class="modal fade"
id="detailModal"
tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Detail Pengumuman
</h5>

<button type="button"
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body"
id="detailBody">

</div>

</div>

</div>

</div>

<script src="api-config.js"></script>

<script>

let data = [];

// ==================== GET DATA ====================

async function getData(){

  try{

    const response = await fetch(
      API_ENDPOINTS.pendaftaran
    );

    if(!response.ok){
      throw new Error("Gagal mengambil data");
    }

    const result = await response.json();

    console.log(result);

    data = result.data || [];

    renderData();

  }catch(error){

    console.log(error);

    alert("Gagal mengambil data");

  }

}

// ==================== RENDER ====================

function renderData(){

  let html = "";

  let keyword =
    document.getElementById("search")
    .value
    .toLowerCase();

  let filter =
    document.getElementById("filterStatus")
    .value;

  let nomor = 1;

  data.forEach((d,index)=>{

    let nama =
      d.nama_lengkap || "-";

    let nim =
      d.nim || "-";

    let prodi =
      d.prodi || "-";

    let status =
      d.seleksi?.status_seleksi
      || "Menunggu";

    let tanggal =
      d.seleksi?.updated_at
      || "-";

    if(
      keyword &&
      !nama.toLowerCase().includes(keyword)
      &&
      !nim.toLowerCase().includes(keyword)
    ){
      return;
    }

    if(filter && status !== filter){
      return;
    }

    let badge = "secondary";

    if(status === "Diterima"){
      badge = "success";
    }

    if(status === "Ditolak"){
      badge = "danger";
    }

    if(status === "Menunggu"){
      badge = "warning";
    }

    html += `

    <tr>

    <td>${nomor++}</td>

    <td>${nama}</td>

    <td>${nim}</td>

    <td>${prodi}</td>

    <td>

    <span class="badge bg-${badge}">
    ${status}
    </span>

    </td>

    <td>
    ${tanggal}
    </td>

    <td>

    <div class="d-flex gap-2 justify-content-center">

    <button
    class="btn btn-info btn-sm"
    onclick="detail(${index})">

    <i class="fa-solid fa-eye"></i>

    </button>

    <select
    class="form-select form-select-sm"
    onchange="ubahStatus('${d.user_id}', this.value)">

    <option value="Menunggu"
    ${status=="Menunggu" ? "selected" : ""}>

    Menunggu

    </option>

    <option value="Diterima"
    ${status=="Diterima" ? "selected" : ""}>

    Diterima

    </option>

    <option value="Ditolak"
    ${status=="Ditolak" ? "selected" : ""}>

    Ditolak

    </option>

    </select>

    </div>

    </td>

    </tr>

    `;

  });

  if(html === ""){

    html = `
    <tr>
    <td colspan="7">
    Tidak ada data
    </td>
    </tr>
    `;
  }

  document.getElementById("tableData")
  .innerHTML = html;

}

// ==================== DETAIL ====================

function detail(index){

  let d = data[index];

  let status =
    d.seleksi?.status_seleksi
    || "Menunggu";

  document.getElementById("detailBody")
  .innerHTML = `

  <p>
  <b>Nama:</b>
  ${d.nama_lengkap || "-"}
  </p>

  <p>
  <b>NIM:</b>
  ${d.nim || "-"}
  </p>

  <p>
  <b>Program Studi:</b>
  ${d.prodi || "-"}
  </p>

  <p>
  <b>Status:</b>
  ${status}
  </p>

  <p>
  <b>Email:</b>
  ${d.email || "-"}
  </p>

  <p>
  <b>No WhatsApp:</b>
  ${d.no_wa || "-"}
  </p>

  `;

  let modal = new bootstrap.Modal(
    document.getElementById("detailModal")
  );

  modal.show();

}

// ==================== UPDATE STATUS ====================

async function ubahStatus(userId,status){

  try{

    const response = await fetch(
      API_ENDPOINTS.seleksi,
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          user_id:userId,
          status_seleksi:status

        })

      }
    );

    const result = await response.json();

    console.log(result);

    if(result.success){

      let peserta =
        data.find(
          x => x.user_id == userId
        );

      if(peserta){

        if(!peserta.seleksi){
          peserta.seleksi = {};
        }

        peserta.seleksi.status_seleksi =
          status;

      }

      renderData();

      alert("Status berhasil diperbarui");

    }else{

      alert("Gagal update status");

    }

  }catch(error){

    console.log(error);

    alert("Terjadi error");

  }

}

// ==================== SEARCH ====================

document.getElementById("search")
.addEventListener(
  "input",
  renderData
);

document.getElementById("filterStatus")
.addEventListener(
  "change",
  renderData
);

// ==================== LOGOUT ====================

function logout(){

  if(confirm("Yakin ingin logout?")){

    localStorage.removeItem("isLogin");

    window.location.href =
      "index.html";

  }

}

// ==================== INIT ====================

getData();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
