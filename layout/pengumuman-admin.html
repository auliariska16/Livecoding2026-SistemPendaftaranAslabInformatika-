</head>

<body>

<div class="main">

<div class="topbar">
<h4>Kelola Pengumuman Seleksi</h4>
</div>

<div class="content">

<div class="card-box">

<input type="text"
id="search"
class="form-control mb-3"
placeholder="Cari nama atau NIM">

<div class="table-box">

<table class="table align-middle">

<thead>
<tr>
<th>Nama</th>
<th>NIM</th>
<th>Prodi</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

</div>
</div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("pendaftar")) || [];

function renderData(){

let html = "";

data.forEach((d,index)=>{

let badge = "secondary";

if(d.status === "Diterima"){
badge = "success";
}

if(d.status === "Ditolak"){
badge = "danger";
}

html += `
<tr>

<td>${d.nama}</td>

<td>${d.nim}</td>

<td>${d.prodi}</td>

<td>
<span class="badge bg-${badge}">
${d.status}
</span>
</td>

<td>

<select class="form-select"
onchange="ubahStatus(${index}, this.value)">

<option value="Menunggu"
${d.status=="Menunggu" ? "selected" : ""}>
Menunggu
</option>

<option value="Diterima"
${d.status=="Diterima" ? "selected" : ""}>
Diterima
</option>

<option value="Ditolak"
${d.status=="Ditolak" ? "selected" : ""}>
Ditolak
</option>

</select>

</td>

</tr>
`;

});

document.getElementById("tableData").innerHTML = html;

}

function ubahStatus(index,status){

data[index].status = status;

localStorage.setItem(
"pendaftar",
JSON.stringify(data)
);

renderData();

}

renderData();

function logout(){

  if(confirm("Yakin ingin logout?")){

    localStorage.removeItem("isLogin");

    window.location.href = "index.html";

  }

}
</script>

</body>
</html>
