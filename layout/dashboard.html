<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../style/dashboard.css?v=7">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    if (localStorage.getItem("isLogin") !== "true") {
      window.location.href = "index.html";
    }
  </script>

</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>ASLAB INFORMATIKA ADMIN</h3>

    <a href="dashboard.html" class="active">
      <i class="fa-solid fa-house"></i>
      Dashboard
    </a>

    <a href="arsip-soal.html">
      <i class="fa-solid fa-folder"></i>
      Arsip Soal
    </a>

    <a href="data-pendaftar.html">
      <i class="fa-solid fa-users"></i>
      Data Pendaftar
    </a>

    <a href="cbt-admin.html">
      <i class="fa-solid fa-book"></i>
      CBT Online
    </a>

    <a href="pengumuman-admin.html">
      <i class="fa-solid fa-bullhorn"></i>
      Pengumuman
    </a>

    <a href="jadwal-wawancara.html">
      <i class="fa-solid fa-calendar-days"></i>
      Jadwal Wawancara
    </a>

    <a href="#" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      Logout
    </a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h5>Dashboard Admin</h5>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- CARD -->
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card-box">
            <p>Total</p>
            <h3 id="total">0</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box success">
            <p>Diterima</p>
            <h3 id="diterima">0</h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-box danger">
            <p>Ditolak</p>
            <h3 id="ditolak">0</h3>
          </div>
        </div>
      </div>

      <!-- CHART -->
      <div class="chart-wrapper mt-4">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      localStorage.removeItem("isLogin");
      window.location.href = "index.html";
    }

    let data = JSON.parse(localStorage.getItem("pendaftar")) || [];
    let chartInstance;

    function updateStat() {
      let total = data.length;
      let diterima = data.filter(d => d.status === "Diterima").length;
      let ditolak = data.filter(d => d.status === "Ditolak").length;

      document.getElementById("total").innerText = total;
      document.getElementById("diterima").innerText = diterima;
      document.getElementById("ditolak").innerText = ditolak;

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(document.getElementById("chart"), {
        type: 'doughnut',
        data: {
          labels: ["Diterima", "Ditolak"],
          datasets: [{
            data: [diterima, ditolak]
          }]
        },
        options: {
          plugins: {
            legend: {
              position: 'bottom'
            }
          },
          maintainAspectRatio: false
        }
      });
    }

    updateStat();

    function logout() {

      if (confirm("Yakin ingin logout?")) {

        localStorage.removeItem("isLogin");

        window.location.href = "index.html";

      }

    }
  </script>

</body>

</html>
