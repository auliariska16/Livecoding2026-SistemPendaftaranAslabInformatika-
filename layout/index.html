<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../style/index.css?v=3">

</head>

<body>

<div class="login-wrapper">
  <div class="login-box">

    <h4 class="title">Sistem Pendaftaran Aslab</h4>
    <p class="subtitle">Login Admin</p>

   <input
type="email"
id="email"
class="form-control mb-3"
placeholder="Email"
onkeydown="handleEnter(event)">

<input
type="password"
id="password"
class="form-control mb-3"
placeholder="Password"
onkeydown="handleEnter(event)">

    <button
id="btnLogin"
onclick="login()"
class="btn btn-primary w-100">

Login

</button>

    <p id="error" class="text-danger mt-3 text-center"></p>

  </div>
</div>

<script>

async function login(){

  let email =
    document.getElementById("email").value;

  let password =
    document.getElementById("password").value;

  let btn =
    document.getElementById("btnLogin");

  let error =
    document.getElementById("error");

  btn.innerHTML =
    `<span class="spinner-border spinner-border-sm"></span> Loading...`;

  btn.disabled = true;

  try{

    const response = await fetch(
      "http://10.21.3.180:8000/api/admin/login",
      {
        method: "POST",

        headers:{
          "Content-Type":"application/json"
        },

        body: JSON.stringify({

          email: email,
          password: password

        })

      }
    );

    const result = await response.json();

    console.log(result);

    if(result.success){

      localStorage.setItem(
        "isLogin",
        "true"
      );

      localStorage.setItem(
        "admin",
        JSON.stringify(result.data)
      );

      window.location.href =
        "dashboard.html";

    } else {

      error.innerText =
        result.message || "Login gagal";

    }

  }catch(err){

    console.log(err);

    error.innerText =
      "Tidak terhubung server";

  }

  btn.innerHTML = "Login";

  btn.disabled = false;

}

function handleEnter(event){

  if(event.key === "Enter"){

    login();

  }

}
document.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    login();
  }

});

</script>

</body>
</html>
