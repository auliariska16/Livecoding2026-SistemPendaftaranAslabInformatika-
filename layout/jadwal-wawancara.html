<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Jadwal Wawancara</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../style/dashboard.css">

</head>

<body>

  <div class="sidebar">

    <h3>ASLAB INFORMATIKA ADMIN</h3>

    <a href="dashboard.html">
      <i class="fa-solid fa-house"></i>
      Dashboard
    </a>

    <a href="arsip-soal.html">
      <i class="fa-solid fa-folder"></i>
      Arsip Soal
    </a>

    <a href="data-pendaftar.html">
      <i class="fa-solid fa-users"></i>
      Data Pendaftar
    </a>

    <a href="cbt-admin.html">
      <i class="fa-solid fa-book"></i>
      CBT Online
    </a>

    <a href="pengumuman-admin.html">
      <i class="fa-solid fa-bullhorn"></i>
      Pengumuman
    </a>

    <a
      href="jadwal-wawancara.html"
      class="active">

      <i class="fa-solid fa-calendar-days"></i>
      Jadwal Wawancara

    </a>

    <a
      href="#"
      onclick="logout()">

      <i class="fa-solid fa-right-from-bracket"></i>
      Logout

    </a>

  </div>

  <div class="main">

    <div class="topbar">
      <h4>Jadwal Wawancara</h4>
    </div>

    <div class="content">

      <div class="card-box mb-4">

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>Nama</label>

            <input
              type="text"
              id="nama"
              class="form-control"
              placeholder="Masukkan nama">

          </div>

          <div class="col-md-6 mb-3">

            <label>Jenis Wawancara</label>

            <select
              id="jenis"
              class="form-select"
              onchange="ubahJenis()">

              <option value="">Pilih</option>
              <option value="offline">Offline</option>
              <option value="online">Online</option>

            </select>

          </div>

          <div class="col-md-6 mb-3">

            <label>Jadwal</label>

            <input
              type="datetime-local"
              id="jadwal"
              class="form-control">

          </div>

          <div class="col-md-6 mb-3">

            <label>Hasil</label>

            <select
              id="hasil"
              class="form-select">

              <option value="Menunggu">
                Menunggu
              </option>

              <option value="Lolos">
                Lolos
              </option>

              <option value="Tidak Lolos">
                Tidak Lolos
              </option>

            </select>

          </div>

          <div class="col-md-6 mb-3">

            <label>Lokasi</label>

            <input
              type="text"
              id="lokasi"
              class="form-control"
              placeholder="Masukkan lokasi">

          </div>

          <div class="col-md-6 mb-3">

            <label>Link Meeting</label>

            <input
              type="text"
              id="link"
              class="form-control"
              placeholder="Masukkan link meeting">

          </div>

          <div class="col-12 mb-3">

            <label>Catatan</label>

            <textarea
              id="catatan"
              class="form-control"
              rows="3"
              readonly>
            </textarea>

          </div>

          <div class="col-12">

            <button
              onclick="simpan()"
              class="btn btn-primary w-100">

              Simpan Jadwal

            </button>

          </div>

        </div>

      </div>

      <div class="row mb-4">

<div class="col-md-3 mb-3">

<div class="card-box text-center">

<h6>Total</h6>

<h3 id="totalData">0</h3>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card-box text-center">

<h6>Lolos</h6>

<h3 id="totalLolos">0</h3>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card-box text-center">

<h6>Tidak Lolos</h6>

<h3 id="totalTidak">0</h3>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card-box text-center">

<h6>Menunggu</h6>

<h3 id="totalMenunggu">0</h3>

</div>

</div>

</div>

<div class="card-box">

<h5 class="mb-3">Daftar Jadwal Wawancara</h5>
        <input
          type="text"
          id="search"
          class="form-control mb-3"
          placeholder="Cari nama peserta"
          onkeyup="render()">

          <select
id="filter"
class="form-select mb-3"
onchange="render()">

<option value="">Semua</option>

<option value="online">
Online
</option>

<option value="offline">
Offline
</option>

<option value="Lolos">
Lolos
</option>

<option value="Tidak Lolos">
Tidak Lolos
</option>

<option value="Menunggu">
Menunggu
</option>

</select>

        <div class="table-responsive">

          <table class="table table-bordered table-hover">

            <thead>

              <tr>

                <th>Nama</th>
                <th>Jenis</th>
                <th>Jadwal</th>
                <th>Lokasi</th>
                <th>Link</th>
                <th>Hasil</th>
                <th>Catatan</th>
                <th>Aksi</th>

              </tr>

            </thead>

            <tbody id="tableData"></tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

  <script>

    let data =
      JSON.parse(localStorage.getItem("wawancara")) || [];

    function ubahJenis() {

      let jenis =
        document.getElementById("jenis").value;

      let lokasi =
        document.getElementById("lokasi");

      let link =
        document.getElementById("link");

      let catatan =
        document.getElementById("catatan");

      if (jenis === "offline") {

        lokasi.disabled = false;

        link.disabled = true;

        link.value = "";

        catatan.value =
          "Datang tepat waktu (offline)";

      }

      else if (jenis === "online") {

        lokasi.disabled = true;

        lokasi.value = "";

        link.disabled = false;

        catatan.value =
          "Standby 10 menit sebelum dimulai";

      }

    }

    function simpan() {

      let nama =
        document.getElementById("nama").value;

      let jenis =
        document.getElementById("jenis").value;

      let jadwal =
        document.getElementById("jadwal").value;

      let lokasi =
        document.getElementById("lokasi").value;

      let link =
        document.getElementById("link").value;

      let hasil =
        document.getElementById("hasil").value;

      let catatan =
        document.getElementById("catatan").value;

      if (
        nama === "" ||
        jenis === "" ||
        jadwal === ""
      ) {

        alert("Lengkapi data");
        return;

      }

      data.push({

        nama,
        jenis,
        jadwal,
        lokasi,
        link,
        hasil,
        catatan

      });

      localStorage.setItem(
        "wawancara",
        JSON.stringify(data)
      );

      render();

      document.getElementById("nama").value = "";
      document.getElementById("jenis").value = "";
      document.getElementById("jadwal").value = "";
      document.getElementById("lokasi").value = "";
      document.getElementById("link").value = "";
      document.getElementById("hasil").value = "Menunggu";
      document.getElementById("catatan").value = "";

    }

    function render(){

let keyword =
document.getElementById("search")?.value.toLowerCase() || "";

let filter =
document.getElementById("filter")?.value || "";

let html = "";

let total = data.length;

let lolos =
data.filter(d => d.hasil === "Lolos").length;

let tidak =
data.filter(d => d.hasil === "Tidak Lolos").length;

let menunggu =
data.filter(d => d.hasil === "Menunggu").length;

document.getElementById("totalData").innerText =
total;

document.getElementById("totalLolos").innerText =
lolos;

document.getElementById("totalTidak").innerText =
tidak;

document.getElementById("totalMenunggu").innerText =
menunggu;

data
.filter(d => {

let cocokNama =
d.nama.toLowerCase().includes(keyword);

let cocokFilter =
filter === "" ||
d.jenis === filter ||
d.hasil === filter;

return cocokNama && cocokFilter;

})

.sort((a,b)=>
new Date(a.jadwal) - new Date(b.jadwal)
)

.forEach((d,index)=>{

let badge = "secondary";

if(d.hasil === "Lolos"){
badge = "success";
}

if(d.hasil === "Tidak Lolos"){
badge = "danger";
}

if(d.hasil === "Menunggu"){
badge = "warning";
}

let tanggal =
new Date(d.jadwal)
.toLocaleString("id-ID");

html += `

<tr>

<td>${d.nama}</td>

<td>
<span class="badge bg-info text-dark">
${d.jenis}
</span>
</td>

<td>${tanggal}</td>

<td>${d.lokasi || "-"}</td>

<td>
${d.link || "-"}
</td>

<td>
<span class="badge bg-${badge}">
${d.hasil}
</span>
</td>

<td>${d.catatan}</td>

<td>

<button
onclick="editData(${index})"
class="btn btn-warning btn-sm mb-1">

Edit

</button>

<button
onclick="hapusData(${index})"
class="btn btn-danger btn-sm">

Hapus

</button>

</td>

</tr>

`;

});

document.getElementById("tableData")
.innerHTML = html;

}
    function logout() {

      if (confirm("Yakin ingin logout?")) {

        localStorage.removeItem("isLogin");

        window.location.href = "index.html";

      }

    }

    render();

  </script>

</body>

</html>
